name: Criteria Update

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: criteria-update-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: contains(github.event.issue.title, 'Criteria update') || contains(join(github.event.issue.labels.*.name, ','), 'criteria')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract criteria JSON from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          body = os.environ.get("ISSUE_BODY", "")
          match = re.search(r"```(?:json)?\s*(\{.*?\})\s*```", body, re.S)
          if not match:
              raise SystemExit("No JSON object found in a fenced code block.")
          criteria = json.loads(match.group(1))
          if not isinstance(criteria, dict):
              raise SystemExit("Criteria payload must be a JSON object.")
          required_lists = [
              "domain_keywords",
              "primary_domain_keywords",
              "seniority_keywords",
              "function_keywords",
              "excluded_companies",
              "excluded_title_keywords",
          ]
          for key in required_lists:
              if not isinstance(criteria.get(key), list) or not criteria[key]:
                  raise SystemExit(f"{key} must be a non-empty list.")
          if not isinstance(criteria.get("minimum_score"), int):
              raise SystemExit("minimum_score must be an integer.")
          Path("criteria.json").write_text(json.dumps(criteria, indent=2) + "\n")
          PY

      - name: Regenerate site
        run: |
          python3 scripts/job_alert_generate.py
          python3 scripts/validate_static_contract.py

      - name: Commit criteria update
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add criteria.json index.html criteria.html archive/ reports/
          if git diff --cached --quiet; then
            echo "No criteria or generated page changes to commit."
            exit 0
          fi
          git commit -m "Apply criteria update from issue #${ISSUE_NUMBER}"
          git push

      - name: Close applied issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" --comment "Applied criteria update, regenerated the site, validated static contracts, and pushed the updated live page to main."
