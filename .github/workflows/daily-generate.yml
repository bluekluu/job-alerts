name: Daily Generate

on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Pacific run window
        id: pacific
        run: |
          SHOULD_RUN=$(TZ=America/Los_Angeles date +%H | python3 -c "import sys; print('true' if sys.stdin.read().strip() == '08' else 'false')")
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.12"
      - name: Generate daily alert
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/job_alert_generate.py
      - name: Validate static contract
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/validate_static_contract.py
      - name: Commit generated alert
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive/ reports/
          if ! git diff --cached --quiet; then
            git commit -m "Job alert: $(TZ=America/Los_Angeles date +%F)"
            git push
          fi
