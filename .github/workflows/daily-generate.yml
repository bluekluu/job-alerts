name: Daily Generate

on:
  schedule:
    - cron: "13 15 * * *"
    - cron: "13 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Pacific run window
        id: pacific
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt
          import os
          from zoneinfo import ZoneInfo

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              print("should_run=true")
              raise SystemExit

          local_date = dt.datetime.now(ZoneInfo("America/Los_Angeles")).date()
          target = dt.datetime.combine(local_date, dt.time(8, 13), ZoneInfo("America/Los_Angeles"))
          expected = target.astimezone(dt.timezone.utc).strftime("%M %H * * *")
          print(f"should_run={'true' if os.environ.get('EVENT_SCHEDULE') == expected else 'false'}")
          print(f"expected_schedule={expected}")
          PY
      - uses: actions/setup-python@v5
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.12"
      - name: Generate daily alert
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/job_alert_generate.py
      - name: Validate static contract
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/validate_static_contract.py
      - name: Commit generated alert
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html criteria.html archive/ reports/
          if ! git diff --cached --quiet; then
            git commit -m "Job alert: $(TZ=America/Los_Angeles date +%F)"
            git push
          fi
