name: Codex Issue Fixer

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to fix
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-issue-fixer-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event_name == 'workflow_dispatch' || (github.event.issue.state == 'open' && contains(join(github.event.issue.labels.*.name, ','), 'needs-codex-fix') && !contains(join(github.event.issue.labels.*.name, ','), 'criteria'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      JOB_ALERT_FEEDBACK_ENDPOINT: https://job-alerts-feedback.bluekluu.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve issue context
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            issue="${{ inputs.issue_number }}"
          else
            issue="${{ github.event.issue.number }}"
          fi
          gh issue view "$issue" --json number,title,body,labels,url,state \
            --jq '{number,title,body,url,state,labels:[.labels[].name]}' > issue.json
          title="$(jq -r .title issue.json)"
          branch="codex/issue-${issue}"
          echo "number=$issue" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          {
            echo "title<<EOF"
            echo "$title"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check OpenAI API key
        env:
          OPENAI_API_KEY_VALUE: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY_VALUE" ]; then
            gh issue comment "${{ steps.issue.outputs.number }}" --body "Codex Issue Fixer could not start because repository secret \`OPENAI_API_KEY\` is not configured."
            exit 1
          fi

      - name: Check out issue branch
        run: |
          branch="${{ steps.issue.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -B "$branch"
          fi

      - name: Build Codex prompt
        run: |
          cat > .codex-issue-prompt.md <<'PROMPT'
          You are Codex fixing a JobAlerts GitHub Issue.

          Repository context:
          - This is the `bluekluu/job-alerts` static GitHub Pages repo.
          - The generated site is produced by `scripts/job_alert_generate.py`.
          - The public feedback form posts to the Cloudflare Worker in `workers/feedback-worker.js`.
          - Keep `JOB_ALERT_FEEDBACK_ENDPOINT=https://job-alerts-feedback.bluekluu.workers.dev` wired into generated pages and workflows.
          - Do not read, print, or request secrets.

          Task:
          1. Read the issue JSON below.
          2. Decide whether it is actionable. If it is only a test/no-op issue, make no code changes and explain that in your final message.
          3. For actionable bugs, make the smallest code/documentation/test changes needed to fix the root cause.
          4. Prefer durable source changes over hand-editing generated HTML. If generated files need to change, update the generator and regenerate.
          5. Run relevant validation, at minimum `python3 scripts/validate_static_contract.py` and Python compile checks when scripts change.
          6. Do not commit, push, create branches, create pull requests, or close issues. The workflow handles that.

          Issue JSON:
          PROMPT
          cat issue.json >> .codex-issue-prompt.md

      - name: Comment start
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" --body "Codex Issue Fixer started on branch \`${{ steps.issue.outputs.branch }}\`."

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-issue-prompt.md
          output-file: codex-output.md
          sandbox: workspace-write

      - name: Validate changes
        run: |
          python3 scripts/validate_static_contract.py
          python3 -m py_compile scripts/*.py
          node --check workers/feedback-worker.js

      - name: Commit and push branch
        id: commit
        run: |
          rm -f .codex-issue-prompt.md codex-output.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Fix issue #${{ steps.issue.outputs.number }}"
          git push --set-upstream origin "${{ steps.issue.outputs.branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        run: |
          issue="${{ steps.issue.outputs.number }}"
          branch="${{ steps.issue.outputs.branch }}"
          title="Fix issue #${issue}: ${{ steps.issue.outputs.title }}"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Fixes #${issue}

          Automated Codex Issue Fixer run for issue #${issue}.

          Validation:
          - python3 scripts/validate_static_contract.py
          - python3 -m py_compile scripts/*.py
          - node --check workers/feedback-worker.js
          EOF
          existing="$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body-file "$body_file"
            pr_number="$existing"
          else
            pr_url="$(gh pr create --title "$title" --body-file "$body_file" --head "$branch" --base main)"
            pr_number="$(gh pr view "$pr_url" --json number --jq .number)"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Comment result
        if: always()
        run: |
          issue="${{ steps.issue.outputs.number }}"
          if [ "${{ job.status }}" != "success" ]; then
            gh issue comment "$issue" --body "Codex Issue Fixer failed before completing. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 0
          fi
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            gh issue comment "$issue" --body "Codex Issue Fixer opened/updated PR #${{ steps.pr.outputs.number }}. The issue will close when a linked PR with \`Fixes #${issue}\` is merged."
          else
            body="Codex Issue Fixer completed without code changes."
            if [ -f codex-output.md ]; then
              body="$body

          Final Codex note:

          $(cat codex-output.md)"
            fi
            gh issue comment "$issue" --body "$body"
          fi
