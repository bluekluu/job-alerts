name: Daily QA

on:
  schedule:
    - cron: "27 15 * * *"
    - cron: "27 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Pacific run window
        id: pacific
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime as dt
          import os
          from zoneinfo import ZoneInfo

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              print("should_run=true")
              raise SystemExit

          local_date = dt.datetime.now(ZoneInfo("America/Los_Angeles")).date()
          target = dt.datetime.combine(local_date, dt.time(8, 27), ZoneInfo("America/Los_Angeles"))
          expected = target.astimezone(dt.timezone.utc).strftime("%M %H * * *")
          print(f"should_run={'true' if os.environ.get('EVENT_SCHEDULE') == expected else 'false'}")
          print(f"expected_schedule={expected}")
          PY
      - uses: actions/setup-python@v5
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.12"
      - name: Run QA report
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/job_alert_test_report.py
        continue-on-error: true
      - name: File or update GitHub issues
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/job_alert_file_bugs.py --apply --comment-existing
      - name: Upload QA report artifact
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: job-alert-qa-report
          path: reports/*.md
      - name: Commit QA report
        if: steps.pacific.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if ! git diff --cached --quiet; then
            git commit -m "QA report: $(date -u +%F)"
            git push
          fi
