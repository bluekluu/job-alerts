name: PR Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Validate static HTML contract
        run: python scripts/validate_static_contract.py
